name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      debug_linux:
        description: Pause an Ubuntu E2E build for interactive SSH diagnostics.
        required: true
        type: boolean
        default: false

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust-target: aarch64-apple-darwin
            bundles: app,dmg
          - os: ubuntu-24.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libgtk-3-dev libepoxy-dev libegl1-mesa-dev libglx-dev librsvg2-dev libmpv2 patchelf plocate recoll webkit2gtk-driver xvfb gstreamer1.0-libav gstreamer1.0-plugins-bad gstreamer1.0-plugins-good gstreamer1.0-tools
      - run: npm ci
      - name: Unit tests
        run: |
          npm test
          cargo test --manifest-path src-tauri/Cargo.toml
      - name: Integration tests
        run: |
          if [ "$RUNNER_OS" = Linux ]; then
            for element in qtdemux h264parse avdec_h264 avdec_aac; do
              gst-inspect-1.0 --exists "$element"
              echo "GStreamer element available: $element"
            done
            LIBGL_ALWAYS_SOFTWARE=1 MESA_LOADER_DRIVER_OVERRIDE=llvmpipe \
              xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24 +extension GLX +render -noreset" \
              npm run test:integration
          else
            npm run test:integration
          fi
      - name: Dump mpv E2E log on failure
        if: failure() && runner.os == 'Linux'
        run: |
          if [ -f /tmp/toka-mpv-e2e.log ]; then
            echo "=== last 400 lines of /tmp/toka-mpv-e2e.log ==="
            tail -400 /tmp/toka-mpv-e2e.log
          else
            echo "No mpv E2E log was written."
          fi
      - run: npm run tauri build -- --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v4
        with:
          name: toka-${{ matrix.rust-target }}
          path: src-tauri/target/${{ matrix.rust-target }}/release/bundle/

  debug-linux:
    if: github.event_name == 'workflow_dispatch' && inputs.debug_linux
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux E2E dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libgtk-3-dev libepoxy-dev libegl1-mesa-dev libglx-dev librsvg2-dev libmpv2 patchelf plocate recoll webkit2gtk-driver xvfb gstreamer1.0-libav gstreamer1.0-plugins-bad gstreamer1.0-plugins-good gstreamer1.0-tools
      - run: npm ci
      - run: npm run build:integration
      - name: Pause for Linux E2E debugging
        uses: mxschmitt/action-tmate@v3
