name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust-target: aarch64-apple-darwin
            bundles: app,dmg
          - os: ubuntu-24.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libgtk-3-dev libepoxy-dev libegl1-mesa-dev libglx-dev librsvg2-dev libmpv2 patchelf plocate recoll webkit2gtk-driver xvfb
      - run: npm ci
      - name: Unit tests
        run: |
          npm test
          cargo test --manifest-path src-tauri/Cargo.toml
      - name: Integration tests
        run: |
          if [ "$RUNNER_OS" = Linux ]; then
            LIBGL_ALWAYS_SOFTWARE=1 xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24 +extension GLX +render -noreset" npm run test:integration
          else
            npm run test:integration
          fi
      - run: npm run tauri build -- --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v4
        with:
          name: toka-${{ matrix.rust-target }}
          path: src-tauri/target/${{ matrix.rust-target }}/release/bundle/
